<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Academic Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark"><i class="bi bi-gradient text-primary me-2"></i>Academic <span class="text-primary">Hub</span></h2>
                    <p class="text-muted">Zaloguj się, aby zarządzać materiałami</p>
                </div>

                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">

                        {% if form.errors %}
                            <div class="alert alert-danger border-0 small py-2" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i> Niepoprawny login lub hasło!
                            </div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="id_username" class="form-label small fw-bold text-secondary">Nazwa użytkownika</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control border-start-0 bg-light" placeholder="Wpisz login">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="id_password" class="form-label small fw-bold text-secondary">Hasło</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" required id="id_password" class="form-control border-start-0 bg-light" placeholder="Wpisz hasło">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Zaloguj się
                            </button>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="{% url 'index' %}" class="text-decoration-none text-muted small">
                        <i class="bi bi-arrow-left"></i> Wróć do przeglądania portalu
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
