<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ field.name }} - Academic Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="bi bi-arrow-left me-2"></i> Wróć do listy kierunków
            </a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row bg-white p-4 rounded shadow-sm border-start border-5 border-primary">
            <div class="col">
                <h1 class="display-6 fw-bold mb-1">{{ field.name }}</h1>
                <p class="text-muted mb-0 fs-5">
                    <i class="bi bi-building"></i> Wydział: <strong>{{ field.faculty.name }} ({{ field.faculty.abbreviation }})</strong>
                </p>
            </div>
        </div>
    </div>

    <div class="container">
        <h3 class="mb-4 text-secondary border-bottom pb-2">Wybierz semestr studiów</h3>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            {% for num in "1234567"|make_list %}
                <div class="col">
                    <div class="card h-100 shadow-sm border-0 hover-effect">
                        <div class="card-body text-center py-4">
                            <div class="display-4 text-primary mb-3">
                                <i class="bi bi-{{ num }}-circle-fill"></i>
                            </div>
                            <h4 class="card-title fw-bold">Semestr {{ num }}</h4>
                            <p class="text-muted small">Przedmioty i materiały dydaktyczne dla semestru {{ num }}.</p>

                            <a href="{% url 'semester_detail' field.id num %}" class="btn btn-outline-primary w-100 mt-2">Zobacz przedmioty</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

    <style>
        .hover-effect { transition: transform 0.2s ease-in-out; }
        .hover-effect:hover { transform: translateY(-5px); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
